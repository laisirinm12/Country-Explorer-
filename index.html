<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

    <h1>🌍 Country Explorer</h1>

    <div class="search-box">
        <input type="text" id="countryInput" placeholder="Enter country name">
        <button onclick="searchCountry()">Search</button>
        <button onclick="randomCountry()">🎲 Random Country</button>
        <div id="suggestions"></div>
    </div>


    <div id="result">
        <h2>🌍 Welcome Explorer!</h2>
        <p>Great day! Let's explore the world and learn something new about different countries.</p>
        <p>Type a country name above and start your journey.</p>
    </div>

    <script src="script.js"></script>

</body>

</html>
